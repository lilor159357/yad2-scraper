name: Yad2 Scraper

on:
  workflow_dispatch:
   
jobs:
  scraper:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install packages
        run: yarn install

      - name: Setup git config
        run: |
          git config user.name "GitHub Actions"
          git config user.email "${{ secrets.GIT_CONFIG_EMAIL }}"

      - name: Run scraper
        run: |
          export EMAIL_USER=${{ secrets.EMAIL_USER }}
          export EMAIL_PASS=${{ secrets.EMAIL_PASS }}
          export EMAIL_TO=${{ secrets.EMAIL_TO }}
          yarn scrape

      - name: Push new json data if needed
        run: |
          if [ -f ./push_me ]; then
            echo Pushing to Github...
            git add .
            DATE=$(date +"%F, %H:%M:%S")
            git commit -m "updated data - $DATE"
            git push
          fi
