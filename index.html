<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yad2 Bot Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <script src="cities.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { darkBg: '#0b1120', cardBg: '#1e293b', primary: '#ff7100', success: '#10b981', danger: '#ef4444' },
                    fontFamily: { sans:['system-ui', '-apple-system', 'sans-serif'] }
                }
            }
        }
    </script>
    
    <style>
        body { background-color: #0b1120; color: #f8fafc; overflow-x: hidden; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .smooth { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .ltr-text { direction: ltr; text-align: left; }
        .spinner { border: 3px solid rgba(255,255,255,0.1); border-left-color: #ff7100; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .tab-btn { padding: 10px 20px; font-weight: bold; border-bottom: 2px solid transparent; cursor: pointer; transition: 0.3s; color: #94a3b8; }
        .tab-btn.active { color: #ff7100; border-bottom-color: #ff7100; }
        .tab-content { display: none; padding-top: 20px; }
        .tab-content.active { display: block; }
        .autocomplete-dropdown { position: absolute; top: 100%; left: 0; right: 0; background: #1e293b; border: 1px solid #334155; border-radius: 0.75rem; margin-top: 0.5rem; max-height: 250px; overflow-y: auto; z-index: 50; display: none; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .autocomplete-item { padding: 12px 16px; cursor: pointer; transition: 0.2s; border-bottom: 1px solid #334155; display: flex; flex-direction: column; }
        .autocomplete-item:last-child { border-bottom: none; }
        .autocomplete-item:hover { background: #334155; }
        .autocomplete-item .title { font-weight: bold; color: #fff; }
        .autocomplete-dropdown::-webkit-scrollbar { width: 6px; }
        .autocomplete-dropdown::-webkit-scrollbar-track { background: transparent; }
        .autocomplete-dropdown::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen flex flex-col font-sans relative">

    <div id="loginScreen" class="fixed inset-0 z-[100] bg-darkBg flex flex-col items-center justify-center p-4">
        <div class="glass p-10 rounded-3xl max-w-md w-full text-center shadow-2xl relative z-10">
            <h1 class="text-3xl font-bold text-white mb-2">Yad2 Scraper Pro</h1>
            <p class="text-slate-400 mb-8">התחבר עם חשבון ה-GitHub שלך כדי לנהל את הבוט.</p>
            <button onclick="loginWithGitHub()" class="w-full bg-white hover:bg-slate-200 text-slate-900 font-bold px-6 py-4 rounded-xl flex items-center justify-center gap-3 smooth">
                <i class="ph-fill ph-github-logo text-2xl"></i> התחבר לגיטהאב
            </button>
        </div>
    </div>

    <div id="loaderScreen" class="fixed inset-0 z-[110] bg-darkBg/90 backdrop-blur-md hidden flex-col items-center justify-center">
        <div class="spinner mb-4 w-12 h-12 border-4"></div>
        <p id="loaderText" class="text-primary font-medium tracking-wide">טוען...</p>
    </div>

    <nav id="mainNav" class="glass sticky top-0 z-40 px-6 py-4 flex justify-between items-center shadow-lg hidden opacity-0 smooth">
        <div class="flex items-center gap-3">
            <div class="bg-primary/20 p-2 rounded-lg text-primary"><i class="ph-fill ph-robot text-2xl"></i></div>
            <h1 class="text-xl font-bold text-white tracking-wide">Yad2 Bot</h1>
        </div>
        <div class="flex items-center gap-4">
            <button onclick="saveToGitHub()" id="saveBtn" class="bg-primary hover:bg-orange-600 smooth text-white px-5 py-2.5 rounded-xl font-medium flex items-center gap-2">
                <i class="ph ph-cloud-arrow-up text-xl"></i> שמור לגיטהאב
            </button>
            <button onclick="logout()" class="bg-slate-800 hover:bg-slate-700 smooth text-slate-300 px-4 py-2.5 rounded-xl font-medium border border-slate-600">
                <i class="ph ph-sign-out text-xl"></i> התנתק
            </button>
        </div>
    </nav>

    <main id="mainContent" class="flex-grow max-w-4xl w-full mx-auto p-4 md:p-8 hidden opacity-0 smooth">
        
        <div class="glass rounded-3xl p-6 md:p-8 shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <h2 class="text-3xl font-bold text-white mb-2">רשימת חיפושים</h2>
                    <p class="text-slate-400">נהל את החיפושים שעליהם הבוט עובר.</p>
                </div>
            </div>

            <div class="mb-8 relative z-30">
                <div class="relative group">
                    <div class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none">
                        <i id="searchIcon" class="ph ph-magnifying-glass text-xl text-slate-400"></i>
                        <div id="searchSpinner" class="spinner w-5 h-5 hidden border-[2px]"></div>
                    </div>
                    <input type="text" id="liveSearchInput" oninput="handleLiveSearch()" placeholder="חיפוש חכם בלייב (עיר, רכב, נדל״ן)..." 
                           class="w-full bg-slate-900 border-2 border-primary/50 focus:border-primary rounded-xl pl-4 pr-12 py-4 text-lg text-white outline-none smooth shadow-[0_0_15px_rgba(255,113,0,0.15)]">
                    <div id="autocompleteDropdown" class="autocomplete-dropdown"></div>
                </div>
                <p class="text-xs text-slate-500 mt-2"><i class="ph-fill ph-lightning text-yellow-400"></i> מחובר ישירות לשרתי יד2 להשלמה אוטומטית!</p>
            </div>

            <div class="bg-slate-800/40 border border-slate-700/50 rounded-2xl p-5 mb-8">
                <div class="flex border-b border-slate-700 mb-4">
                    <div class="tab-btn active" onclick="switchTab('builder')"><i class="ph ph-magic-wand mr-1"></i> יצירת חיפוש</div>
                    <div class="tab-btn" onclick="switchTab('manual')"><i class="ph ph-link mr-1"></i> הדבקת לינק חכם</div>
                </div>

                <div id="tab-builder" class="tab-content active">
                    <div class="grid grid-cols-1 md:grid-cols-6 gap-4 mb-4">
                        <div class="md:col-span-1">
                            <label class="block text-sm text-slate-400 mb-1">שם החיפוש</label>
                            <input type="text" id="buildName" placeholder="למשל: נדלן בת ים" class="w-full bg-slate-900 border border-slate-700 focus:border-primary rounded-xl px-4 py-3 text-white outline-none smooth">
                        </div>
                        <div class="md:col-span-1">
                            <label class="block text-sm text-slate-400 mb-1">קטגוריה</label>
                            <select id="buildCat" class="w-full bg-slate-900 border border-slate-700 focus:border-primary rounded-xl px-4 py-3 text-white outline-none smooth cursor-pointer">
                                <option value="market">יד שנייה</option>
                                <option value="vehicles/cars">רכבים פרטיים</option>
                                <option value="realestate/forsale">נדל"ן למכירה</option>
                                <option value="realestate/rent">נדל"ן להשכרה</option>
                            </select>
                        </div>
                        <div class="md:col-span-1">
                            <label class="block text-sm text-slate-400 mb-1">עיר (מקושר ללמ"ס)</label>
                            <input list="citiesList" id="buildCity" placeholder="הקלד עיר..." class="w-full bg-slate-900 border border-slate-700 focus:border-primary rounded-xl px-4 py-3 text-white outline-none smooth">
                            <datalist id="citiesList"></datalist>
                        </div>
                        <div class="md:col-span-1">
                            <label class="block text-sm text-slate-400 mb-1">מייל (אופציונלי)</label>
                            <input type="email" id="buildEmail" placeholder="ברירת מחדל" class="w-full bg-slate-900 border border-slate-700 focus:border-primary rounded-xl px-4 py-3 text-white outline-none smooth">
                        </div>
                        <div class="md:col-span-2">
                            <label class="block text-sm text-slate-400 mb-1">מילת חיפוש חופשית</label>
                            <input type="text" id="buildQ" placeholder="דגם, רחוב או מילה..." class="w-full bg-slate-900 border border-slate-700 focus:border-primary rounded-xl px-4 py-3 text-white outline-none smooth">
                        </div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-4 items-end">
                        <div class="md:col-span-1">
                            <label class="block text-sm text-slate-400 mb-1">מחיר מ- (₪)</label>
                            <input type="number" id="buildMin" placeholder="מינימום" class="w-full bg-slate-900 border border-slate-700 focus:border-primary rounded-xl px-4 py-3 text-white outline-none smooth">
                        </div>
                        <div class="md:col-span-1">
                            <label class="block text-sm text-slate-400 mb-1">מחיר עד- (₪)</label>
                            <input type="number" id="buildMax" placeholder="מקסימום" class="w-full bg-slate-900 border border-slate-700 focus:border-primary rounded-xl px-4 py-3 text-white outline-none smooth">
                        </div>
                        <div class="md:col-span-2">
                            <button onclick="generateAndAdd()" class="w-full bg-primary hover:bg-orange-600 text-white rounded-xl font-bold py-3 smooth shadow-lg flex justify-center items-center gap-2">
                                <i class="ph-bold ph-plus"></i> הוסף לרשימה
                            </button>
                        </div>
                    </div>
                </div>

                <div id="tab-manual" class="tab-content">
                    <div class="grid grid-cols-1 md:grid-cols-12 gap-4">
                        <input type="text" id="manualName" placeholder="שם החיפוש" class="md:col-span-3 bg-slate-900 border border-slate-700 focus:border-primary rounded-xl px-4 py-3 text-white outline-none smooth">
                        <input type="text" id="manualUrl" placeholder="https://www.yad2.co.il/..." class="md:col-span-4 bg-slate-900 border border-slate-700 focus:border-primary rounded-xl px-4 py-3 text-white outline-none smooth ltr-text placeholder:text-right">
                        <input type="email" id="manualEmail" placeholder="מייל נמען (אופציונלי)" class="md:col-span-3 bg-slate-900 border border-slate-700 focus:border-primary rounded-xl px-4 py-3 text-white outline-none smooth ltr-text placeholder:text-right">
                        <button onclick="addManualProject()" class="md:col-span-2 bg-slate-700 hover:bg-primary text-white rounded-xl font-bold smooth">הוסף</button>
                    </div>
                </div>
            </div>

            <div id="projectsList" class="space-y-4"></div>
        </div>
    </main>

    <div id="toastContainer" class="fixed bottom-6 right-6 z-[300] flex flex-col gap-3 pointer-events-none"></div>

    <script>
        const CONFIG = {
            GITHUB_USER: 'lilor159357',
            GITHUB_REPO: 'yad2-scraper',
            FILE_PATH: 'config.json',
            GITHUB_CLIENT_ID: 'YOUR_GITHUB_CLIENT_ID_HERE'
        };

        let configData = { projects: [] };
        let fileSha = null;
        let githubToken = null;
        let debounceTimer = null;

        const handleLiveSearch = () => {
            const query = document.getElementById('liveSearchInput').value.trim();
            const dropdown = document.getElementById('autocompleteDropdown');
            const icon = document.getElementById('searchIcon');
            const spinner = document.getElementById('searchSpinner');

            if (query.length < 2) { dropdown.style.display = 'none'; return; }
            icon.classList.add('hidden'); spinner.classList.remove('hidden');

            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(async () => {
                try {
                    const res = await fetch(`/api/autocomplete?q=${encodeURIComponent(query)}`);
                    const jsonRes = await res.json();
                    const suggestions = jsonRes.data?.suggestions || {};
                    let html = '';

                    const catMap = {
                        'realestate': { label: 'נדל״ן', icon: 'ph-house', val: 'realestate/forsale' },
                        'vehicles': { label: 'רכב', icon: 'ph-car', val: 'vehicles/cars' },
                        'goods': { label: 'יד שנייה', icon: 'ph-shopping-bag', val: 'market' }
                    };

                    for (const [catKey, items] of Object.entries(suggestions)) {
                        if (items && items.length > 0 && catMap[catKey]) {
                            html += `<div class="px-4 py-2 bg-slate-800 text-xs font-bold text-slate-400 flex items-center gap-2 border-b border-slate-700"><i class="ph-fill ${catMap[catKey].icon} text-primary"></i> ${catMap[catKey].label}</div>`;
                            items.forEach(item => {
                                html += `<div class="autocomplete-item" onclick="selectSuggestion('${item.replace(/'/g, "\\'")}', '${catMap[catKey].val}')"><span class="title pr-6">${item}</span></div>`;
                            });
                        }
                    }

                    if (html) { dropdown.innerHTML = html; dropdown.style.display = 'block'; } 
                    else { dropdown.innerHTML = '<div class="p-4 text-slate-500 text-center">לא נמצאו תוצאות.</div>'; dropdown.style.display = 'block'; }
                } catch (e) { console.error('Autocomplete fetch error:', e); } 
                finally { icon.classList.remove('hidden'); spinner.classList.add('hidden'); }
            }, 500); 
        };

        const selectSuggestion = (text, categoryValue) => {
            switchTab('builder');
            document.getElementById('buildName').value = text;
            document.getElementById('buildQ').value = text;
            document.getElementById('buildCat').value = categoryValue;
            document.getElementById('buildCity').value = '';
            document.getElementById('buildMin').value = '';
            document.getElementById('buildMax').value = '';
            document.getElementById('autocompleteDropdown').style.display = 'none';
            document.getElementById('liveSearchInput').value = '';
            showToast('נבחר בהצלחה!');
        };

        document.addEventListener('click', (e) => {
            if (!e.target.closest('#liveSearchInput') && !e.target.closest('#autocompleteDropdown')) { document.getElementById('autocompleteDropdown').style.display = 'none'; }
        });

        const switchTab = (tab) => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelector(`.tab-btn[onclick="switchTab('${tab}')"]`).classList.add('active');
            document.getElementById(`tab-${tab}`).classList.add('active');
        };

        const showToast = (msg, type = 'success') => {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            const colors = type === 'success' ? 'bg-success/20 border-success/30 text-emerald-400' : 'bg-danger/20 border-danger/30 text-red-400';
            const icon = type === 'success' ? 'ph-check-circle' : 'ph-warning-octagon';
            toast.className = `flex items-center gap-3 glass ${colors} px-5 py-3 rounded-2xl shadow-xl transform transition-all duration-300 translate-y-10 opacity-0 border`;
            toast.innerHTML = `<i class="ph-fill ${icon} text-2xl"></i><span class="font-medium">${msg}</span>`;
            container.appendChild(toast);
            requestAnimationFrame(() => toast.classList.remove('translate-y-10', 'opacity-0'));
            setTimeout(() => { toast.classList.add('opacity-0', 'translate-y-2'); setTimeout(() => toast.remove(), 300); }, 3500);
        };

        const showLoader = (show, text = 'טוען...') => {
            const l = document.getElementById('loaderScreen');
            document.getElementById('loaderText').innerText = text;
            show ? l.classList.replace('hidden', 'flex') : l.classList.replace('flex', 'hidden');
        };

        const utf8_to_b64 = str => window.btoa(unescape(encodeURIComponent(str)));
        const b64_to_utf8 = str => decodeURIComponent(escape(window.atob(str)));

        const generateAndAdd = () => {
            const name = document.getElementById('buildName').value.trim();
            const cat = document.getElementById('buildCat').value;
            const q = document.getElementById('buildQ').value.trim();
            const city = document.getElementById('buildCity').value.trim();
            const email = document.getElementById('buildEmail').value.trim();
            const min = document.getElementById('buildMin').value.trim();
            const max = document.getElementById('buildMax').value.trim();
            
            if (!name) return showToast('יש לתת שם לחיפוש', 'error');
            
            let url = `https://www.yad2.co.il/${cat}/search?`;
            const params = new URLSearchParams();
            
            if (q) params.append('q', q);
            
            if (city && window.CITIES_DICT && window.CITIES_DICT[city]) {
                params.append('city', window.CITIES_DICT[city]);
            } else if (city) { showToast(`העיר '${city}' לא נמצאה.`, 'error'); }

            if (min || max) {
                let priceStr = "";
                if (min && max) priceStr = `${min}-${max}`;
                else if (min) priceStr = `${min}-`;
                else if (max) priceStr = `-${max}`;
                params.append('price', priceStr);
            }
            
            url += params.toString();
            configData.projects.unshift({ topic: name, url: url, email: email || null });
            
            document.getElementById('buildName').value = ''; document.getElementById('buildQ').value = '';
            document.getElementById('buildCity').value = ''; document.getElementById('buildEmail').value = '';
            document.getElementById('buildMin').value = ''; document.getElementById('buildMax').value = '';
            
            renderList();
        };

        const addManualProject = () => {
            const topic = document.getElementById('manualName').value.trim();
            const url = document.getElementById('manualUrl').value.trim();
            const email = document.getElementById('manualEmail').value.trim();
            if (!topic || !url) return showToast('יש למלא שם ולינק', 'error');
            configData.projects.unshift({ topic, url, email: email || null });
            document.getElementById('manualName').value = ''; document.getElementById('manualUrl').value = ''; document.getElementById('manualEmail').value = '';
            renderList();
        };

        const loginWithGitHub = () => { window.location.href = `https://github.com/login/oauth/authorize?client_id=${CONFIG.GITHUB_CLIENT_ID}&scope=repo`; };
        const logout = () => { localStorage.removeItem('gh_token_yad2'); window.location.href = window.location.pathname; };

        const handleOAuthCallback = async (code) => {
            showLoader(true, 'מאמת מול GitHub...');
            try {
                const res = await fetch(`/api/github-callback?code=${code}`);
                if (!res.ok) throw new Error('שגיאה בקבלת טוקן');
                const data = await res.json();
                if (data.token) {
                    localStorage.setItem('gh_token_yad2', data.token);
                    window.location.href = window.location.pathname;
                } else { throw new Error('טוקן חסר'); }
            } catch (error) {
                showLoader(false);
                alert(`שגיאה: ${error.message}`);
            }
        };

        const loadFromGitHub = async () => {
            showLoader(true, 'טוען הגדרות מגיטהאב...');
            try {
                const res = await fetch(`https://api.github.com/repos/${CONFIG.GITHUB_USER}/${CONFIG.GITHUB_REPO}/contents/${CONFIG.FILE_PATH}`, { headers: { 'Authorization': `token ${githubToken}` } });
                if (res.ok) {
                    const data = await res.json();
                    fileSha = data.sha;
                    configData = JSON.parse(b64_to_utf8(data.content));
                } else if (res.status === 404) { configData = { projects: [] }; } 
                else { throw new Error('שגיאה במשיכת קובץ - ודא שיש לך הרשאת גישה לריפו.'); }
                if(!configData.projects) configData.projects = [];
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('mainNav').classList.remove('hidden', 'opacity-0');
                document.getElementById('mainContent').classList.remove('hidden', 'opacity-0');
                renderList();
            } catch (err) {
                showToast(err.message, 'error');
                if(err.message.includes('הרשאת גישה')) logout(); 
            }
            showLoader(false);
        };

        const saveToGitHub = async () => {
            showLoader(true, 'שומר שינויים ל-GitHub...');
            const jsonString = JSON.stringify(configData, null, 2);
            const body = { message: 'Update Yad2 Config via Admin UI', content: utf8_to_b64(jsonString) };
            if (fileSha) body.sha = fileSha;
            try {
                const res = await fetch(`https://api.github.com/repos/${CONFIG.GITHUB_USER}/${CONFIG.GITHUB_REPO}/contents/${CONFIG.FILE_PATH}`, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${githubToken}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.message);
                fileSha = data.content.sha; 
                showToast('נשמר בהצלחה ב-GitHub! 🎉', 'success');
            } catch (err) { showToast(`שגיאה: ${err.message}`, 'error'); }
            showLoader(false);
        };

        const renderList = () => {
            const list = document.getElementById('projectsList');
            list.innerHTML = configData.projects.map((p, i) => `
                <div class="bg-slate-800/40 border border-slate-700/50 rounded-2xl p-5 flex flex-col md:flex-row justify-between items-center gap-4 ${p.disabled ? 'opacity-50' : ''}">
                    <div class="flex-grow w-full overflow-hidden">
                        <div class="flex items-center gap-2 mb-1">
                            <h3 class="font-bold text-white text-lg">${p.topic}</h3>
                            ${p.disabled ? '<span class="bg-red-500/20 text-red-400 text-xs px-2 py-0.5 rounded flex-shrink-0">מושעה</span>' : '<span class="bg-green-500/20 text-green-400 text-xs px-2 py-0.5 rounded flex-shrink-0">פעיל</span>'}
                        </div>
                        <p class="text-xs text-slate-400 ltr-text font-mono truncate" style="direction: ltr;">
                            ${p.url}
                        </p>
                        ${p.email ? `<p class="text-sm mt-2 text-indigo-400 font-medium"><i class="ph-fill ph-envelope-simple"></i> התראות יישלחו אל: <span class="ltr-text inline-block">${p.email}</span></p>` : ''}
                    </div>
                    <div class="flex gap-2 flex-shrink-0">
                        <button onclick="toggleProject(${i})" class="bg-slate-900 border border-slate-700 text-slate-300 hover:text-white px-4 py-2 rounded-xl text-sm smooth w-20 text-center">
                            ${p.disabled ? 'הפעל' : 'השהה'}
                        </button>
                        <button onclick="removeProject(${i})" class="bg-slate-900 border border-slate-700 hover:border-red-500/30 text-red-400 hover:bg-red-500/10 px-4 py-2 rounded-xl smooth"><i class="ph ph-trash text-lg"></i></button>
                    </div>
                </div>
            `).join('');
            if (configData.projects.length === 0) list.innerHTML = '<div class="text-center text-slate-500 py-6">אין חיפושים פעילים ברשימה.</div>';
        };

        const removeProject = (i) => { if (confirm('האם למחוק חיפוש זה?')) { configData.projects.splice(i, 1); renderList(); } };
        const toggleProject = (i) => { configData.projects[i].disabled = !configData.projects[i].disabled; renderList(); };

        window.onload = async () => {
            const loadCitiesToUI = () => {
                const datalist = document.getElementById('citiesList');
                datalist.innerHTML = ''; 
                if (window.CITIES_DICT) {
                    Object.keys(window.CITIES_DICT).sort().forEach(cityName => {
                        const option = document.createElement('option');
                        option.value = cityName;
                        datalist.appendChild(option);
                    });
                }
            };
            loadCitiesToUI();
            window.addEventListener('citiesLoaded', loadCitiesToUI);

            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code');
            if (code) { await handleOAuthCallback(code); } 
            else {
                githubToken = localStorage.getItem('gh_token_yad2');
                if (githubToken) loadFromGitHub();
            }
        };
    </script>
