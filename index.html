<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yad2 Bot Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkBg: '#0b1120',
                        cardBg: '#1e293b',
                        primary: '#ff7100', // צבע יד2
                        success: '#10b981',
                        danger: '#ef4444'
                    },
                    fontFamily: { sans:['system-ui', '-apple-system', 'sans-serif'] }
                }
            }
        }
    </script>
    
    <style>
        body { background-color: #0b1120; color: #f8fafc; overflow-x: hidden; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .smooth { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .ltr-text { direction: ltr; text-align: left; }
        .spinner { border: 3px solid rgba(255,255,255,0.1); border-left-color: #ff7100; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen flex flex-col font-sans relative">

    <!-- Login Screen -->
    <div id="loginScreen" class="fixed inset-0 z-[100] bg-darkBg flex flex-col items-center justify-center p-4">
        <div class="glass p-10 rounded-3xl max-w-md w-full text-center shadow-2xl relative z-10">
            <h1 class="text-3xl font-bold text-white mb-2">Yad2 Scraper Pro</h1>
            <p class="text-slate-400 mb-8">הכנס סיסמת מנהל כדי לנהל את הבוט.</p>
            <input type="password" id="passwordInput" placeholder="סיסמת ניהול..." 
                   class="w-full bg-slate-900 border border-slate-700 focus:border-primary rounded-xl px-5 py-4 text-white outline-none smooth text-center mb-4"
                   onkeypress="if(event.key === 'Enter') login()">
            <button onclick="login()" class="w-full bg-primary hover:bg-orange-600 text-white font-bold px-6 py-4 rounded-xl flex items-center justify-center gap-3 smooth shadow-[0_0_15px_rgba(255,113,0,0.4)]">
                <i class="ph-fill ph-lock-key text-2xl"></i> התחבר
            </button>
            <p id="loginError" class="text-red-400 mt-4 hidden text-sm">סיסמה שגויה או שגיאת שרת.</p>
        </div>
    </div>

    <!-- Loader -->
    <div id="loaderScreen" class="fixed inset-0 z-[110] bg-darkBg/90 backdrop-blur-md hidden flex-col items-center justify-center">
        <div class="spinner mb-4 w-12 h-12 border-4"></div>
        <p id="loaderText" class="text-primary font-medium tracking-wide">טוען נתונים...</p>
    </div>

    <!-- Navbar -->
    <nav id="mainNav" class="glass sticky top-0 z-40 px-6 py-4 flex justify-between items-center shadow-lg hidden opacity-0 smooth">
        <div class="flex items-center gap-3">
            <div class="bg-primary/20 p-2 rounded-lg text-primary"><i class="ph-fill ph-robot text-2xl"></i></div>
            <h1 class="text-xl font-bold text-white tracking-wide">Yad2 Bot</h1>
        </div>
        <div class="flex items-center gap-4">
            <button onclick="saveData()" id="saveBtn" class="bg-primary hover:bg-orange-600 smooth text-white px-5 py-2.5 rounded-xl font-medium flex items-center gap-2">
                <i class="ph ph-cloud-arrow-up text-xl"></i> שמור לענן
            </button>
            <button onclick="logout()" class="bg-slate-800 hover:bg-slate-700 smooth text-slate-300 px-4 py-2.5 rounded-xl font-medium border border-slate-600">
                <i class="ph ph-sign-out text-xl"></i> התנתק
            </button>
        </div>
    </nav>

    <!-- Main Content -->
    <main id="mainContent" class="flex-grow max-w-4xl w-full mx-auto p-4 md:p-8 hidden opacity-0 smooth">
        
        <div class="glass rounded-3xl p-6 md:p-8 shadow-2xl">
            <div class="flex justify-between items-center mb-8">
                <div>
                    <h2 class="text-3xl font-bold text-white mb-2">רשימת חיפושים</h2>
                    <p class="text-slate-400">נהל את החיפושים שעליהם הבוט עובר.</p>
                </div>
            </div>

            <!-- Add New -->
            <div class="bg-slate-800/40 border border-slate-700/50 rounded-2xl p-5 mb-8">
                <h3 class="text-white font-medium mb-4 flex items-center gap-2"><i class="ph text-primary ph-plus-circle text-xl"></i> הוסף חיפוש חדש</h3>
                <div class="grid grid-cols-1 md:grid-cols-12 gap-4">
                    <input type="text" id="newTopic" placeholder="שם החיפוש (למשל: רכב הונדה)" class="md:col-span-4 bg-slate-900 border border-slate-700 focus:border-primary rounded-xl px-4 py-3 text-white outline-none smooth">
                    <input type="text" id="newUrl" placeholder="לינק מהדפדפן של יד2..." class="md:col-span-6 bg-slate-900 border border-slate-700 focus:border-primary rounded-xl px-4 py-3 text-white outline-none smooth ltr-text placeholder:text-right">
                    <button onclick="addProject()" class="md:col-span-2 bg-slate-700 hover:bg-primary text-white rounded-xl font-bold smooth">הוסף</button>
                </div>
            </div>

            <!-- List -->
            <div id="projectsList" class="space-y-4"></div>
        </div>
    </main>

    <div id="toastContainer" class="fixed bottom-6 right-6 z-[300] flex flex-col gap-3 pointer-events-none"></div>

    <script>
        let configData = { projects: [] };
        let fileSha = null;

        const showToast = (msg, type = 'success') => {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            const colors = type === 'success' ? 'bg-success/20 border-success/30 text-emerald-400' : 'bg-danger/20 border-danger/30 text-red-400';
            const icon = type === 'success' ? 'ph-check-circle' : 'ph-warning-octagon';
            toast.className = `flex items-center gap-3 glass ${colors} px-5 py-3 rounded-2xl shadow-xl transform transition-all duration-300 translate-y-10 opacity-0 border`;
            toast.innerHTML = `<i class="ph-fill ${icon} text-2xl"></i><span class="font-medium">${msg}</span>`;
            container.appendChild(toast);
            requestAnimationFrame(() => toast.classList.remove('translate-y-10', 'opacity-0'));
            setTimeout(() => { toast.classList.add('opacity-0', 'translate-y-2'); setTimeout(() => toast.remove(), 300); }, 3500);
        };

        const showLoader = (show, text = 'טוען...') => {
            const l = document.getElementById('loaderScreen');
            document.getElementById('loaderText').innerText = text;
            show ? l.classList.replace('hidden', 'flex') : l.classList.replace('flex', 'hidden');
        };

        const utf8_to_b64 = str => window.btoa(unescape(encodeURIComponent(str)));
        const b64_to_utf8 = str => decodeURIComponent(escape(window.atob(str)));

        // --- תקשורת עם השרת של Vercel ---
        const login = async () => {
            const pwd = document.getElementById('passwordInput').value;
            if (!pwd) return;
            showLoader(true, 'מתחבר לשרת...');
            try {
                const res = await fetch('/api/config', { headers: { 'x-admin-password': pwd } });
                if (!res.ok) throw new Error();
                
                const data = await res.json();
                fileSha = data.sha;
                configData = JSON.parse(b64_to_utf8(data.content));
                if (!configData.projects) configData.projects = [];
                
                sessionStorage.setItem('adminPwd', pwd);
                document.getElementById('loginScreen').classList.add('hidden');
                document.getElementById('mainNav').classList.remove('hidden', 'opacity-0');
                document.getElementById('mainContent').classList.remove('hidden', 'opacity-0');
                renderList();
            } catch (e) {
                document.getElementById('loginError').classList.remove('hidden');
            }
            showLoader(false);
        };

        const saveData = async () => {
            const pwd = sessionStorage.getItem('adminPwd');
            showLoader(true, 'שומר לגיטהאב...');
            try {
                const res = await fetch('/api/config', {
                    method: 'POST',
                    headers: { 'x-admin-password': pwd, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        content: utf8_to_b64(JSON.stringify(configData, null, 2)),
                        sha: fileSha
                    })
                });
                if (!res.ok) throw new Error();
                const data = await res.json();
                fileSha = data.content.sha;
                showToast('ההגדרות נשמרו בהצלחה בגיטהאב!');
            } catch (e) {
                showToast('שגיאה בשמירה', 'error');
            }
            showLoader(false);
        };

        // --- ניהול ה-UI ---
        const renderList = () => {
            const list = document.getElementById('projectsList');
            list.innerHTML = configData.projects.map((p, i) => `
                <div class="bg-slate-800/40 border border-slate-700/50 rounded-2xl p-5 flex flex-col md:flex-row justify-between items-center gap-4 ${p.disabled ? 'opacity-50' : ''}">
                    <div class="flex-grow w-full">
                        <div class="flex items-center gap-2 mb-1">
                            <h3 class="font-bold text-white text-lg">${p.topic}</h3>
                            ${p.disabled ? '<span class="bg-red-500/20 text-red-400 text-xs px-2 py-0.5 rounded">מושעה</span>' : '<span class="bg-green-500/20 text-green-400 text-xs px-2 py-0.5 rounded">פעיל</span>'}
                        </div>
                        <p class="text-xs text-slate-400 ltr-text font-mono truncate max-w-xl">${p.url}</p>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="toggleProject(${i})" class="bg-slate-900 border border-slate-700 text-slate-300 hover:text-white px-4 py-2 rounded-xl text-sm smooth w-24">
                            ${p.disabled ? 'הפעל' : 'השהה'}
                        </button>
                        <button onclick="removeProject(${i})" class="bg-slate-900 border border-slate-700 hover:border-red-500/30 text-red-400 hover:bg-red-500/10 px-4 py-2 rounded-xl smooth"><i class="ph ph-trash text-lg"></i></button>
                    </div>
                </div>
            `).join('');
            if (configData.projects.length === 0) list.innerHTML = '<div class="text-center text-slate-500 py-6">אין חיפושים פעילים.</div>';
        };

        const addProject = () => {
            const topic = document.getElementById('newTopic').value;
            const url = document.getElementById('newUrl').value;
            if (!topic || !url) return showToast('יש למלא את כל השדות', 'error');
            configData.projects.unshift({ topic, url });
            document.getElementById('newTopic').value = ''; document.getElementById('newUrl').value = '';
            renderList();
        };

        const removeProject = (i) => { if (confirm('למחוק חיפוש זה?')) { configData.projects.splice(i, 1); renderList(); } };
        const toggleProject = (i) => { configData.projects[i].disabled = !configData.projects[i].disabled; renderList(); };
        const logout = () => { sessionStorage.removeItem('adminPwd'); location.reload(); };

        if (sessionStorage.getItem('adminPwd')) {
            document.getElementById('passwordInput').value = sessionStorage.getItem('adminPwd');
            login();
        }
    </script>
</body>
</html>
